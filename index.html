<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gig List</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    .date {
      margin-top: 25px;
      font-size: 40px;
      font-weight: bold;
      color: #aaa;
      border-bottom: 1px solid #333;
      padding-bottom: 5px;
    }

    .event {
      padding: 6px 0;
      border-bottom: 1px solid #222;
    }

    .title {
      font-weight: bold;
    }

    .venue, .time, .price {
      margin-left: 10px;
      color: #ccc;
      font-size: 28px;
    }
  </style>
</head>

<body>

<h1>Gig Listings</h1>
<div id="app"></div>

<script src="script.js"></script>

</html>
